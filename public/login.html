<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMS Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <style>
    .modal-content { border-radius: 15px; border: none; }
    .card { border-radius: 15px; }
  </style>
</head>
<body class="bg-light">
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-4">
        <div class="card p-4 shadow-lg border-0">
          <h3 class="text-center mb-4">SMS Portal Login</h3>
          <form id="loginForm">
            <div class="mb-3">
              <label class="form-label text-muted small fw-bold">EMAIL ADDRESS</label>
              <input type="email" class="form-control form-control-lg" id="email" required>
            </div>
            <div class="mb-3">
              <label class="form-label text-muted small fw-bold">PASSWORD</label>
              <div class="input-group">
                <input type="password" class="form-control form-control-lg" id="password" required>
                <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('password', 'loginEye')">
                  <i class="bi bi-eye" id="loginEye"></i>
                </button>
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100 mt-2">Sign In</button>
          </form>
          <div id="errorMsg" class="text-danger mt-2 small"></div>
          <p class="mt-4 text-center small text-muted">New student? <a href="#" class="text-primary fw-bold text-decoration-none" data-bs-toggle="modal" data-bs-target="#safetyLockModal">Register here</a></p>
        </div>
      </div>
    </div>
  </div>

  <!-- Safety Lock Modal -->
  <div class="modal fade" id="safetyLockModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content shadow-lg">
        <div class="modal-header border-0 pb-0">
          <h5 class="modal-title fw-bold"><i class="bi bi-shield-lock-fill text-primary me-2"></i>Safety Lock</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body pt-3">
          <label class="form-label text-muted small fw-bold">ENTER PASSWORD TO ACCESS REGISTRATION:</label>
          <div class="input-group">
            <input type="password" id="safetyCodeInput" class="form-control form-control-lg">
            <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('safetyCodeInput', 'safetyEye')">
              <i class="bi bi-eye" id="safetyEye"></i>
            </button>
          </div>
          <div id="modalError" class="text-danger mt-2 small" style="display:none;"><i class="bi bi-exclamation-circle me-1"></i>Access Denied: Incorrect Password.</div>
        </div>
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-primary btn-lg w-100" id="verifyBtn">Verify & Proceed</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/main.js"></script>
  <script>
    function togglePassword(id, eyeId) {
      const el = document.getElementById(id);
      const eye = document.getElementById(eyeId);
      if (el.type === "password") {
        el.type = "text";
        eye.classList.replace("bi-eye", "bi-eye-slash");
      } else {
        el.type = "password";
        eye.classList.replace("bi-eye-slash", "bi-eye");
      }
    }

    document.getElementById("verifyBtn").addEventListener("click", () => {
      const val = document.getElementById("safetyCodeInput").value.trim();
      
      // Extremely flexible check to ensure it works
      // Matches "systum" with any number of 'm's, case-insensitive
      const pattern = /^systum+$/i;
      
      if (pattern.test(val)) {
        // We still save the correct one expected by backend
        sessionStorage.setItem("registration_gate_key", "Systummm"); 
        window.location.href = "/register";
      } else {
        document.getElementById("modalError").style.display = "block";
        document.getElementById("safetyCodeInput").value = "";
      }
    });

    document.getElementById("safetyCodeInput").addEventListener("keypress", (e) => { 
      if(e.key === 'Enter') document.getElementById("verifyBtn").click(); 
    });
  </script>
</body>
</html>
