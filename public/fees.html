<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fees Management | NIET SMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container-fluid p-0">
  <div class="row g-0">
    <nav class="col-md-3 col-lg-2 sidebar">
      <div class="position-sticky">
        <h4 class="text-center mb-4 px-3"><i class="fas fa-university me-2"></i>NIET SMS</h4>
        <ul class="nav flex-column">
          <li class="nav-item"><a class="nav-link" href="/dashboard"><i class="fas fa-chart-line"></i> Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="/students.html"><i class="fas fa-user-graduate"></i> Manage Students</a></li>
          <li class="nav-item"><a class="nav-link" href="/register"><i class="fas fa-user-plus"></i> Add Student</a></li>
          <li class="nav-item"><a class="nav-link" href="/attendance"><i class="fas fa-calendar-check"></i> Attendance</a></li>
          <li class="nav-item"><a class="nav-link" href="/marks"><i class="fas fa-file-invoice"></i> Marks Entry</a></li>
          <li class="nav-item"><a class="nav-link active" href="/fees"><i class="fas fa-rupee-sign"></i> Fees Status</a></li>
        </ul>
        <hr class="mx-3 bg-light opacity-25">
        <div class="px-3"><button class="btn btn-outline-danger w-100 mt-3 btn-modern" id="logoutBtn">Logout</button></div>
      </div>
    </nav>

    <main class="content-wrapper col-md-9 ms-sm-auto col-lg-10">
      <div class="interactive-card mb-4" style="background: var(--green-gradient); color: white;">
        <h3 class="fw-bold m-0"><i class="fas fa-rupee-sign me-2"></i>Finance & Fees</h3>
        <p class="opacity-75 mb-0">Manage student fee payments and status.</p>
      </div>

      <div class="interactive-card mb-4">
        <form id="feesForm" class="row g-3">
          <div class="col-md-4">
            <label class="small fw-bold text-muted mb-1">STUDENT</label>
            <select id="studentSelect" class="form-select rounded-3" required></select>
          </div>
          <div class="col-md-3">
            <label class="small fw-bold text-muted mb-1">AMOUNT</label>
            <input type="number" id="amountInput" class="form-control rounded-3" placeholder="₹ 0.00" required>
          </div>
          <div class="col-md-3">
            <label class="small fw-bold text-muted mb-1">STATUS</label>
            <select id="paidSelect" class="form-select rounded-3" required>
              <option value="true">Paid</option>
              <option value="false">Pending</option>
            </select>
          </div>
          <div class="col-md-2 d-flex align-items-end">
            <button type="submit" id="submitBtn" class="btn btn-primary-modern w-100 btn-modern">Update</button>
            <input type="hidden" id="editId">
          </div>
        </form>
      </div>

      <div class="modern-table table-responsive">
        <table class="table table-hover align-middle mb-0" id="feesTable">
          <thead>
            <tr><th>Student Name</th><th>Amount</th><th>Status</th><th>Date</th><th>Actions</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </main>
  </div>
</div>

<script src="/js/fees.js"></script>
</body>
</html>
