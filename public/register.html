<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register Student | NIET SMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container-fluid p-0">
  <div class="row g-0">
    <nav class="col-md-3 col-lg-2 sidebar">
      <div class="position-sticky">
        <h4 class="text-center mb-4 px-3"><i class="fas fa-university me-2"></i>NIET SMS</h4>
        <ul class="nav flex-column">
          <li class="nav-item"><a class="nav-link" href="/dashboard"><i class="fas fa-chart-line"></i> Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="/students.html"><i class="fas fa-user-graduate"></i> Manage Students</a></li>
          <li class="nav-item"><a class="nav-link active" href="/register"><i class="fas fa-user-plus"></i> Add Student</a></li>
          <li class="nav-item"><a class="nav-link" href="/attendance"><i class="fas fa-calendar-check"></i> Attendance</a></li>
          <li class="nav-item"><a class="nav-link" href="/marks"><i class="fas fa-file-invoice"></i> Marks Entry</a></li>
          <li class="nav-item"><a class="nav-link" href="/fees"><i class="fas fa-rupee-sign"></i> Fees Status</a></li>
        </ul>
      </div>
    </nav>

    <main class="content-wrapper col-md-9 ms-sm-auto col-lg-10">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="interactive-card">
            <div class="text-center mb-4">
              <div class="bg-primary d-inline-block p-3 rounded-circle text-white mb-3 shadow">
                <i class="fas fa-user-shield fa-2x"></i>
              </div>
              <h3 class="fw-bold">Student Enrollment</h3>
              <p class="text-muted">Create a new student profile and system account.</p>
            </div>

            <form id="registerForm" class="row g-3">
              <div class="col-md-6">
                <label class="small fw-bold text-muted mb-1">FULL NAME</label>
                <input type="text" class="form-control rounded-3" id="name" placeholder="Enter Full Name" required>
              </div>
              <div class="col-md-6">
                <label class="small fw-bold text-muted mb-1">EMAIL ADDRESS</label>
                <input type="email" class="form-control rounded-3" id="email" placeholder="student@example.com" required>
              </div>
              <div class="col-md-6">
                <label class="small fw-bold text-muted mb-1">SYSTEM PASSWORD</label>
                <input type="password" class="form-control rounded-3" id="password" placeholder="Create Password" required>
              </div>
              <div class="col-md-6">
                <label class="small fw-bold text-muted mb-1">SYSTEM ROLE</label>
                <select class="form-select rounded-3" id="role" required onchange="toggleStudentFields()">
                  <option value="student">Student</option>
                  <option value="admin">Admin</option>
                </select>
              </div>

              <div id="studentFields" class="row g-3 px-0 mx-0 mt-2">
                <hr class="mt-4 mb-2 opacity-25">
                <div class="col-md-4">
                  <label class="small fw-bold text-muted mb-1">ROLL NUMBER</label>
                  <input type="text" class="form-control rounded-3" id="rollNumber" placeholder="e.g. 240133">
                </div>
                <div class="col-md-4">
                  <label class="small fw-bold text-muted mb-1">CLASS</label>
                  <input type="text" class="form-control rounded-3" id="class" placeholder="e.g. 10th">
                </div>
                <div class="col-md-4">
                  <label class="small fw-bold text-muted mb-1">SECTION</label>
                  <input type="text" class="form-control rounded-3" id="section" placeholder="e.g. A">
                </div>
                <div class="col-md-6">
                  <label class="small fw-bold text-muted mb-1">DATE OF BIRTH</label>
                  <input type="date" class="form-control rounded-3" id="dob">
                </div>
                <div class="col-md-6">
                  <label class="small fw-bold text-muted mb-1">UPLOAD PHOTOGRAPH</label>
                  <input type="file" class="form-control rounded-3" id="photo" accept="image/*">
                </div>
              </div>

              <div class="col-12 mt-4">
                <button type="submit" class="btn btn-primary-modern w-100 btn-modern py-3">Finalize Enrollment</button>
              </div>
            </form>
            <div id="errorMsg" class="text-danger mt-3 small text-center"></div>
            <p class="mt-4 text-center small" id="loginLink">Already an administrator? <a href="/login" class="text-decoration-none fw-bold">Sign In</a></p>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script>
    const token = localStorage.getItem("token");
    const role = localStorage.getItem("role");
    if (!(token && role === 'admin')) {
      if (!sessionStorage.getItem("registration_gate_key")) window.location.href = "/login";
    }
    if (token && role === 'admin') document.getElementById("loginLink").style.display = "none";

    function toggleStudentFields() {
      const role = document.getElementById("role").value;
      const fields = document.getElementById("studentFields");
      fields.style.display = role === "student" ? "flex" : "none";
      const inputs = fields.querySelectorAll("input");
      inputs.forEach(input => { if (input.type !== 'file') input.required = (role === "student"); });
    }
    toggleStudentFields();

    document.getElementById("registerForm").addEventListener("submit", async function(e){
      e.preventDefault();
      const formData = new FormData();
      formData.append("name", document.getElementById("name").value);
      formData.append("email", document.getElementById("email").value);
      formData.append("password", document.getElementById("password").value);
      formData.append("role", document.getElementById("role").value);
      const gateKey = sessionStorage.getItem("registration_gate_key");
      if (gateKey) formData.append("registrationPassword", gateKey);
      
      if (document.getElementById("role").value === "student") {
        formData.append("rollNumber", document.getElementById("rollNumber").value);
        formData.append("class", document.getElementById("class").value);
        formData.append("section", document.getElementById("section").value);
        formData.append("dob", document.getElementById("dob").value);
        const photoFile = document.getElementById("photo").files[0];
        if (photoFile) formData.append("photo", photoFile);
      }

      try {
        const headers = token ? { "Authorization": `Bearer ${token}` } : {};
        const response = await fetch("/api/auth/register", { method:"POST", headers: headers, body: formData });
        const data = await response.json();
        if(response.ok){
          alert("Registration successful!");
          sessionStorage.removeItem("registration_gate_key");
          window.location.href = (token && role === 'admin') ? "/dashboard" : "/login";
        } else {
          document.getElementById("errorMsg").textContent = data.message || "Registration failed";
        }
      } catch(error){
        document.getElementById("errorMsg").textContent = "Server error";
      }
    });
</script>
</body>
</html>
